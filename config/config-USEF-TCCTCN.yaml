optimizer: !name:torch.optim.Adam
  lr: 0.0001
  weight_decay: 0

checkpoint: 1
continue_from: ''
max_norm: 5
print_freq: 100
name: USEF-TCCTCN/libri2mix

# Disable frontend freezing for from-scratch TCCTCN training.
freeze_frontend_warmup: False
frontend_warmup_epochs: 10
frontend_unfreeze_lr_scale: 0.1

epochs: 200
batch_size: 2
num_workers: 8
valid_batch_size: 1
num_spks: 1

duration: 4
sample_rate: 8000

# Replace these three paths with your own Libri2Mix / WSJ0-2mix list directories.
# Each directory should contain mix.scp, ref.scp, and aux.scp.
dataset_type: libri2mix  # [wsj0-2mix, libri2mix]
train_path: data/train/libri2mix
valid_path: data/dev/libri2mix
test_path: data/test/libri2mix

mix_scp: mix.scp
ref_scp: ref.scp
aux_scp: aux.scp

# Encoder parameters
N_encoder_out: 256
out_channels: 256
encoder_kernel_size: 16
encoder_kernel_stride: 8
embd: 256

# Target-Conditioned Causal TCN backend parameters
tc_conv_channels: 512
tc_kernel_size: 3
tc_num_blocks: 8
tc_num_repeats: 3
tc_dropout: 0.0
use_gated_residual_film: True

# Specifying the network
Encoder: !new:models.model_USEF_TCCTCN.Encoder
  kernel_size: !ref <encoder_kernel_size>
  out_channels: !ref <N_encoder_out>

Decoder: !new:models.model_USEF_TCCTCN.Decoder
  in_channels: !ref <N_encoder_out>
  out_channels: 1
  kernel_size: !ref <encoder_kernel_size>
  stride: !ref <encoder_kernel_stride>
  bias: False

Fusion_mdl: !new:models.local.TransformerEncoderCross.TransformerEncoderCross
  num_layers: 4
  d_model: !ref <out_channels>
  nhead: 8
  d_ffn: 1024
  dropout: 0
  # normalize_before: True

FiLM: !new:models.model_USEF_TCCTCN.FiLM
  size: !ref <out_channels>

MaskNet: !new:models.model_USEF_TCCTCN.Tar_Model
  encoder: !ref <Encoder>
  decoder: !ref <Decoder>
  fusion_mdl: !ref <Fusion_mdl>
  film: !ref <FiLM>
  in_channels: !ref <N_encoder_out>
  out_channels: !ref <out_channels>
  num_spks: !ref <num_spks>
  conv_channels: !ref <tc_conv_channels>
  kernel_size: !ref <tc_kernel_size>
  num_blocks: !ref <tc_num_blocks>
  num_repeats: !ref <tc_num_repeats>
  dropout: !ref <tc_dropout>
  use_gated_residual_film: !ref <use_gated_residual_film>

modules:
  masknet: !ref <MaskNet>
