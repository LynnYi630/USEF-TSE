sample_rate: 8000

wsj0-2mix: data/test/wsj0-2mix
wham!: data/test/wham!
whamr!: data/test/whamr!
libri2mix: data/test/libri2mix

mix_scp: mix.scp
ref_scp: ref.scp
aux_scp: aux.scp

# Encoder parameters
N_encoder_out: 256
out_channels: 256
kernel_size: 16
kernel_stride: 8
embd: 256

# Specifying the network (指向新建的 model_USEF_Mamba 模块)
Encoder: !new:models.model_USEF_Mamba.Encoder
    kernel_size: !ref <kernel_size>
    out_channels: !ref <N_encoder_out>

Decoder: !new:models.model_USEF_Mamba.Decoder
    in_channels: !ref <N_encoder_out>
    out_channels: 1
    kernel_size: !ref <kernel_size> 
    stride: !ref <kernel_stride>
    bias: False

Fusion_mdl: !new:models.local.TransformerEncoderCross.TransformerEncoderCross
    num_layers: 4
    d_model: !ref <out_channels>
    nhead: 8
    d_ffn: 1024
    dropout: 0

FiLM: !new:models.model_USEF_Mamba.FiLM
    size: !ref <out_channels>

MaskNet: !new:models.model_USEF_Mamba.Tar_Model
    encoder: !ref <Encoder>
    decoder: !ref <Decoder>
    fusion_mdl: !ref <Fusion_mdl>
    film: !ref <FiLM>
    in_channels: !ref <N_encoder_out>
    out_channels: !ref <out_channels>
    num_spks: !ref <num_spks>

modules:
    masknet: !ref <MaskNet>